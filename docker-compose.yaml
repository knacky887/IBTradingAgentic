# ============================================================
# TradingApp — Docker Compose
# ============================================================
# Provides Redis (message bus + TimeSeries), Grafana, and Prometheus.
# Usage:  docker-compose up -d

version: "3.9"

services:
  redis:
    image: redis/redis-stack:latest
    container_name: tradingapp-redis
    ports:
      - "6379:6379"     # Redis
      - "8001:8001"     # RedisInsight (GUI)
    volumes:
      - redis_data:/data
    environment:
      - REDIS_ARGS=--appendonly yes
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: tradingapp-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: tradingapp-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=trading
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  redis_data:
  grafana_data:
